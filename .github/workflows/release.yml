# Build macOS + Windows packages and attach them to a GitHub Release.
# Pattern adapted from https://github.com/henryoman/gifbin (tag / workflow_dispatch).
#
# Trigger:
#   git tag v0.1.0 && git push origin v0.1.0
#   — or — Actions → Release → Run workflow (version without leading v)

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to package, without the leading v"
        required: true
        default: "0.1.0"

permissions:
  contents: write

env:
  NATIVE_CLI_VERSION: "0.4.2"
  ZIG_VERSION: "0.16.0"
  BUN_VERSION: "1.3.14"
  NODE_VERSION: "22"

jobs:
  package:
    name: Package (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            label: macos-arm64
            target: macos
            artifact: Compressor-macos-arm64.zip
          - os: windows-latest
            label: windows-x64
            target: windows
            artifact: Compressor-windows-x64.zip

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Native SDK CLI
        run: npm install -g "@native-sdk/cli@${{ env.NATIVE_CLI_VERSION }}"

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          version="${version#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $version (expected major.minor.patch)" >&2
            exit 1
          fi
          bash ./scripts/set-version.sh "$version"
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "Resolved version: $version"

      - name: Validate markup
        run: native check

      - name: Unit tests
        run: native test --yes

      - name: Bun encoder tests
        run: bun test scripts/compress.test.ts

      - name: Build release binary
        run: native build --yes

      - name: Embed Windows exe icon
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\embed-exe-icon.ps1 `
            -Exe .\zig-out\bin\image-compressor.exe `
            -Ico .\assets\icon.ico

      - name: Package macOS app
        if: matrix.target == 'macos'
        run: |
          native package \
            --target macos \
            --signing adhoc \
            --manifest app.zon \
            --binary zig-out/bin/image-compressor \
            --output zig-out/package/Compressor.app
          mkdir -p dist
          ditto -c -k --keepParent \
            zig-out/package/Compressor.app \
            "dist/${{ matrix.artifact }}"
          shasum -a 256 "dist/${{ matrix.artifact }}" \
            > "dist/${{ matrix.artifact }}.sha256"
          ls -lh dist/

      - name: Package Windows app
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          native package `
            --target windows `
            --manifest app.zon `
            --binary zig-out/bin/image-compressor.exe `
            --output zig-out/package/windows
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zip = Join-Path "dist" "${{ matrix.artifact }}"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "zig-out\package\windows\*" -DestinationPath $zip
          $hash = (Get-FileHash -Algorithm SHA256 $zip).Hash.ToLower()
          Set-Content -NoNewline -Path "$zip.sha256" -Value "$hash  ${{ matrix.artifact }}"
          Get-ChildItem dist | Format-Table Name, Length

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.artifact }}.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          version="${version#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build SHA256SUMS
        working-directory: dist
        run: |
          ls -lh
          {
            cat Compressor-macos-arm64.zip.sha256
            echo
            cat Compressor-windows-x64.zip.sha256
            echo
          } > SHA256SUMS
          cat SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Compressor v${{ steps.ver.outputs.version }}
          draft: false
          prerelease: ${{ startsWith(steps.ver.outputs.version, '0.') }}
          generate_release_notes: true
          body: |
            ## Install

            | Platform | Artifact |
            | --- | --- |
            | macOS (Apple Silicon) | `Compressor-macos-arm64.zip` |
            | Windows (x64) | `Compressor-windows-x64.zip` |

            Verify downloads with `SHA256SUMS` (or the per-file `.sha256` sidecars).

            ### macOS
            1. Unzip, then drag **Compressor.app** to Applications (optional).
            2. First launch: **right-click → Open** (ad-hoc signed; Gatekeeper blocks double-click until then).
            3. Needs [Bun](https://bun.sh) 1.4+ on `PATH` for WebP encode.

            ### Windows
            1. Unzip and run `image-compressor.exe` (SmartScreen may warn on unsigned builds — More info → Run anyway).
            2. Needs [Bun](https://bun.sh) 1.4+ on `PATH` for WebP encode.
          files: |
            dist/Compressor-macos-arm64.zip
            dist/Compressor-macos-arm64.zip.sha256
            dist/Compressor-windows-x64.zip
            dist/Compressor-windows-x64.zip.sha256
            dist/SHA256SUMS
